version: "3.9"

services:
  # ── FastAPI 서버 ──────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      - vlm
      - llm
    restart: unless-stopped

  # ── Streamlit UI ──────────────────────────────────────────
  ui:
    build: .
    command: streamlit run ui/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  # ── VLM (GPU 0) - Qwen2-VL-7B-AWQ ───────────────────────
  vlm:
    image: vllm/vllm-openai:latest
    ports:
      - "8001:8001"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    command: >
      --model Qwen/Qwen2-VL-7B-Instruct-AWQ
      --port 8001
      --tensor-parallel-size 1
      --quantization awq
      --max-model-len 4096
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    restart: unless-stopped

  # ── LLM (GPU 1) - Qwen2.5-14B-AWQ ──────────────────────
  llm:
    image: vllm/vllm-openai:latest
    ports:
      - "8002:8002"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    command: >
      --model Qwen/Qwen2.5-14B-Instruct-AWQ
      --port 8002
      --tensor-parallel-size 1
      --quantization awq
      --max-model-len 8192
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    restart: unless-stopped

  # ── Langfuse 관측성 ──────────────────────────────────────
  langfuse:
    image: langfuse/langfuse:latest
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=securedoc-langfuse-secret
      - SALT=securedoc-langfuse-salt
    depends_on:
      - langfuse-db
    restart: unless-stopped

  langfuse-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  langfuse_data:
